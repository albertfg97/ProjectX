<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acestream Web</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js"></script>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-modal">
    <h2>Acestream Web</h2>
    <p>Inicia sesión para continuar</p>
    <form id="login-form">
      <input type="text" id="login-user" placeholder="Usuario" autocomplete="username">
      <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password">
      <button class="login-btn" type="submit">Iniciar sesión</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<div class="header">
  <button class="menu-btn">☰</button>
  <h1>Acestream Web</h1>
  <input type="text" id="search" placeholder="Buscar canales...">
  <div class="header-right">
    <div id="admin-btn-wrap" style="display:none">
      <button class="admin-btn" id="admin-btn">Admin</button>
    </div>
    <span class="user-name" id="user-span"></span>
    <div id="logout-btn-wrap" style="display:none">
      <button class="logout-btn" id="logout-btn">Salir</button>
    </div>
  </div>
</div>

<div class="app-content hidden">
  <div class="sidebar-backdrop"></div>
  <div class="sidebar-outer">
    <div class="sidebar" id="sidebar"></div>
    <div class="sidebar-footer">
      <button class="refresh-btn">↻ Refresh Channels</button>
    </div>
  </div>
  <div class="main">
    <div class="player-wrapper" id="player-wrapper">
      <div class="player-placeholder">
        <div class="icon">&#9654;</div>
        <p>Selecciona un canal para comenzar</p>
      </div>
      <div class="player-state">
        <div class="state-icon"></div>
        <div class="state-msg"></div>
        <div class="state-sub"></div>
      </div>
      <video id="player-video"></video>
      <div class="player-overlay">
        <div class="controls-bg">
          <div class="controls-row">
            <button class="ctrl-btn play-toggle">▶</button>
            <span class="time-display time-current">0:00</span>
            <span class="time-sep">/</span>
            <span class="time-display time-duration">0:00</span>
            <button class="ctrl-btn live-btn">● LIVE</button>
            <div class="progress-wrap">
              <div class="progress-track">
                <div class="progress-fill"></div>
                <div class="progress-thumb"></div>
              </div>
            </div>
            <div class="volume-wrap">
              <button class="ctrl-btn small mute-toggle">🔊</button>
              <div class="volume-slider">
                <input type="range" min="0" max="1" step="0.05" value="1">
              </div>
            </div>
            <div class="audio-btn">
              <button class="ctrl-btn small">🎵<span class="audio-label">1</span></button>
              <div class="audio-menu"></div>
            </div>
            <button class="ctrl-btn pip-btn">📌</button>
            <button class="ctrl-btn full-btn">⛶</button>
          </div>
        </div>
      </div>
    </div>
    <div class="now-playing">
      <span>Reproduciendo: <span class="np-name" id="np-name"></span></span>
      <span class="np-status"><span class="dot"></span>En vivo <span class="np-quality"></span></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="epg-modal">
  <div class="modal">
    <div class="modal-header">
      <img id="epg-modal-logo" src="" alt="" onerror="this.style.display='none'">
      <span class="modal-title" id="epg-modal-title"></span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body" id="epg-modal-body"></div>
  </div>
</div>

<div class="modal-overlay" id="admin-panel">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <span class="modal-title">Panel de Administración</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="admin-section" id="admin-users"></div>
      <div class="admin-msg" id="admin-msg"></div>
      <div class="admin-section" id="admin-active"></div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
